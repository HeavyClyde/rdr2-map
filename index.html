<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Carte RDR2 Interactive</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; font-family: 'Special Elite', cursive; background:#1b1a17; color:#f5e6c8; }
    #map { height: 100vh; }

    .popup-form input, .popup-form select {
      width: 100%;
      margin-bottom: 5px;
      background:#2a2621;
      color:#f5e6c8;
      border:none;
      padding:5px;
    }

    .popup-form button {
      width:100%;
      background:#6b4f2a;
      border:none;
      padding:5px;
      cursor:pointer;
    }

    .filters {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(20,15,10,0.9);
      padding: 10px;
      border-radius: 12px;
      z-index: 1000;
    }

    .compass {
      position: absolute;
      bottom: 20px;
      right: 20px;
      width: 80px;
      height: 80px;
      background: url('https://i.imgur.com/8QfQZ6F.png') no-repeat center/contain;
      z-index: 1000;
    }
  </style>
</head>
<body>

<div class="filters">
  <button onclick="setFilter('all')">Tout</button>
  <button onclick="setFilter('registre')">Registre</button>
  <button onclick="setFilter('culture')">Culture</button>
  <button onclick="setFilter('bandit')">Bandit</button>
  <button onclick="setFilter('poi')">POI</button>
</div>

<div class="compass"></div>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-storage-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_BUCKET",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

// ✅ CALIBRAGE EXACT IMAGE
const width = 6000;
const height = 4500;
const bounds = [[0,0], [height, width]];

const map = L.map('map', {
  crs: L.CRS.Simple,
  minZoom: -2,
  maxZoom: 2,
  maxBounds: bounds,
  maxBoundsViscosity: 1.0
});

L.imageOverlay('map-rdr2.jpg', bounds).addTo(map);
map.fitBounds(bounds);
map.setMaxBounds(bounds);

const icons = {
  registre: L.icon({ iconUrl: 'icons/registre.png', iconSize: [32, 32] }),
  culture: L.icon({ iconUrl: 'icons/culture.png', iconSize: [32, 32] }),
  bandit: L.icon({ iconUrl: 'icons/bandit.png', iconSize: [32, 32] }),
  poi: L.icon({ iconUrl: 'icons/poi.png', iconSize: [32, 32] })
};

let markers = [];
let currentFilter = 'all';

function renderPoint(doc) {
  const p = doc.data();
  const marker = L.marker([p.y, p.x], { icon: icons[p.type] }).addTo(map);
  marker.data = { id: doc.id, type: p.type };

  marker.on('mouseover', () => {
    marker.bindPopup(`
      <b>${p.name}</b><br>
      <img src="${p.imageUrl}" width="200"><br>
      <button onclick="deletePoint('${doc.id}')">Supprimer</button>
    `).openPopup();
  });

  markers.push(marker);
}

function refreshMarkers() {
  markers.forEach(m => {
    if (currentFilter === 'all' || m.data.type === currentFilter) {
      m.addTo(map);
    } else {
      map.removeLayer(m);
    }
  });
}

function setFilter(type) {
  currentFilter = type;
  refreshMarkers();
}

function deletePoint(id) {
  if (confirm("Supprimer ce point ?")) {
    db.collection("points").doc(id).delete();
  }
}

// 🔄 realtime
db.collection("points").onSnapshot(snapshot => {
  markers.forEach(m => map.removeLayer(m));
  markers = [];
  snapshot.forEach(doc => renderPoint(doc));
  refreshMarkers();
});

// 🖱️ CLIC DROIT → AJOUT POINT
map.on('contextmenu', function(e) {

  const popupContent = `
    <div class="popup-form">
      <input type="text" id="p_name" placeholder="Nom" />
      <select id="p_type">
        <option value="registre">Registre</option>
        <option value="culture">Culture</option>
        <option value="bandit">Bandit</option>
        <option value="poi">POI</option>
      </select>
      <input type="file" id="p_image" />
      <button onclick="submitPoint(${e.latlng.lat}, ${e.latlng.lng})">Ajouter</button>
    </div>
  `;

  L.popup()
    .setLatLng(e.latlng)
    .setContent(popupContent)
    .openOn(map);
});

// ➕ SAVE POINT
async function submitPoint(lat, lng) {
  const name = document.getElementById("p_name").value;
  const type = document.getElementById("p_type").value;
  const file = document.getElementById("p_image").files[0];

  if (!name || !file) {
    alert("Champs manquants");
    return;
  }

  const storageRef = storage.ref("images/" + Date.now() + file.name);
  await storageRef.put(file);
  const imageUrl = await storageRef.getDownloadURL();

  await db.collection("points").add({
    name,
    type,
    x: lng,
    y: lat,
    imageUrl
  });

  map.closePopup();
}
</script>

</body>
</html>
